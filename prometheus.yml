global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "spring"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["spring:8080"]

  - job_name: "mysql"
    static_configs:
      - targets: ["mysqld-exporter:9104"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]