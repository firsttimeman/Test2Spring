spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blogdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      port: 6379
      host: localhost

logging:
  level:
    org.hibernate.sql: debug

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  base-url: https://dapi.kakao.com

naver:
  base-url: https://openapi.naver.com
  client-id: 73dIeysEyxaupJcnPwVX
  client-secret: ${NAVER_REST_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


resilience4j:
  circuitbreaker:
    instances:
      kakaoBlogSearch:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10            # 최근 10번 기준으로 실패율 계산
        minimum-number-of-calls: 5         # 최소 5번은 호출돼야 통계 시작
        failure-rate-threshold: 50         # 실패율 50% 이상 → OPEN
        wait-duration-in-open-state: 5s    # OPEN 상태 유지 시간
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true




